name: Daily Stock Market Scan

on:
  schedule:
    - cron: '30 11 * * *' # 5:00 PM IST (11:30 AM UTC), after NSE market closes
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write

jobs:
  stock-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies for TA-Lib
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget
          wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib/
          ./configure --prefix=/usr
          make
          sudo make install
          cd ..
          rm -rf ta-lib ta-lib-0.4.0-src.tar.gz

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync
          uv pip install jupyter nbconvert

      - name: Install Playwright and BROWSER dependencies
        run: |
          uv run playwright install chromium
          uv run playwright install-deps chromium

      - name: Execute Jupyter Notebook
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Running the notebook and letting it overwrite its own cells results
          uv run jupyter nbconvert --to notebook --execute StockMarket_changes.ipynb --inplace

      - name: Commit and Push output files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Adding all new directories (the date-folder) and modified notebook
          git add .
          git commit -m "Auto-run scan: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
