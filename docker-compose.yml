# Note: The 'volumes' section for postgres_data has been removed 
# because your data is now stored in Supabase.


services:
  app:
    # Use your pre-built image from Docker Hub
    image: kanji070/strend-app:latest
    container_name: fastapi_app
    restart: always
    
    env_file:
      - .env
    environment:
      - TZ=Asia/Kolkata

    # Port mapping (External:Internal)
    ports:
      - "8000:8000"

    # Security/Performance optimization
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"